<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Bell</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #ff66cc;
    text-shadow: 0 0 20px #ff66cc;
    font-weight: bold;
    width: 90%;
    z-index: 2;
}

#text {
    font-size: 70px;
    opacity: 0;
    transition: opacity 1s;
}

#heart {
    font-size: 100px;
    opacity: 0;
    transition: 2s;
}

@media (max-width: 700px) {
    #text { font-size: 40px; }
    #heart { font-size: 60px; }
}
</style>
</head>

<body onclick="startAll()">

<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<div class="center">
    <div id="text"></div>
    <div id="heart">❤️</div>
</div>

<script>
let started = false;

function startAll() {
    if (started) return;
    started = true;
    document.getElementById("music").play().catch(()=>{});
    startText();
}

// VERY FEW FALLING TEXT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const phrase = "i love you bell";
const fontSize = 24; // bigger text

let lines = [
    {x: 50, y: -100, speed: 0.3},
    {x: 300, y: -300, speed: 0.4},
    {x: 600, y: -200, speed: 0.35},
    {x: 900, y: -400, speed: 0.3}
];

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff2e88";
    ctx.font = fontSize + "px Arial";

    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(phrase, lines[i].x, lines[i].y);
        lines[i].y += lines[i].speed;

        if (lines[i].y > canvas.height) {
            lines[i].y = -100;
        }
    }
}

setInterval(draw, 40);

// CENTER TEXT STEPS
const steps = [
    "3",
    "2",
    "1",
    "I'm",
    "sorry",
    "bell",
    "please forgive me",
    "it was my fault 💔"
];

let stepIndex = 0;
const textDiv = document.getElementById("text");
const heart = document.getElementById("heart");

function startText() {
    showStep();
    const interval = setInterval(showStep, 2300);

    function showStep() {
        textDiv.style.opacity = 0;

        setTimeout(() => {
            textDiv.innerHTML = steps[stepIndex];
            textDiv.style.opacity = 1;
            stepIndex++;

            if (stepIndex >= steps.length) {
                heart.style.opacity = 1;
                clearInterval(interval);
            }
        }, 500);
    }
}
</script>

</body>
</html>
