<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Bell</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #ff66cc;
    text-shadow: 0 0 20px #ff66cc;
    font-weight: bold;
    width: 90%;
    z-index: 2;
}

#text {
    font-size: 70px;
    opacity: 0;
    transition: opacity 1s;
}

#heart {
    font-size: 100px;
    opacity: 0;
    transition: 2s;
}

@media (max-width: 700px) {
    #text { font-size: 40px; }
    #heart { font-size: 60px; }
}
</style>
</head>

<body onclick="startAll()">

<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<div class="center">
    <div id="text"></div>
    <div id="heart">❤️</div>
</div>

<script>
let started = false;

function startAll() {
    if (started) return;
    started = true;
    document.getElementById("music").play().catch(()=>{});
    startText();
}

// BACKGROUND FALLING TEXT (SLOW + READABLE)
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const phrase = "i love you bell";
const fontSize = 18;      // text size
const columnWidth = 200;  // distance between columns (bigger = fewer sentences)
let drops = [];

function setup() {
    const columns = Math.floor(canvas.width / columnWidth);
    drops = [];
    for (let i = 0; i < columns; i++) {
        drops.push({
            x: i * columnWidth,
            y: Math.random() * -canvas.height,
            speed: 0.5 + Math.random() * 0.5   // slow speed
        });
    }
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff2e88";
    ctx.font = fontSize + "px Arial";

    for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        ctx.fillText(phrase, d.x, d.y);
        d.y += d.speed;

        if (d.y > canvas.height) {
            d.y = -50;
        }
    }
}

setup();
setInterval(draw, 40);

// CENTER TEXT STEPS
const steps = [
    "3",
    "2",
    "1",
    "I'm",
    "sorry",
    "bell",
    "please forgive me",
    "it was my fault 💔"
];

let stepIndex = 0;
const textDiv = document.getElementById("text");
const heart = document.getElementById("heart");

function startText() {
    showStep();
    const interval = setInterval(showStep, 2200);

    function showStep() {
        textDiv.style.opacity = 0;

        setTimeout(() => {
            textDiv.innerHTML = steps[stepIndex];
            textDiv.style.opacity = 1;
            stepIndex++;

            if (stepIndex >= steps.length) {
                heart.style.opacity = 1;
                clearInterval(interval);
            }
        }, 500);
    }
}
</script>

</body>
</html>
