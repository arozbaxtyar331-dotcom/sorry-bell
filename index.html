<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Bell</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #ff66cc;
    font-weight: bold;
    width: 90%;
    z-index: 2;
}

#text {
    font-size: 70px;
    opacity: 0;
    transition: opacity 1s;
}

#heart {
    font-size: 100px;
    opacity: 0;
    transition: 2s;
}

@media (max-width: 700px) {
    #text { font-size: 40px; }
    #heart { font-size: 60px; }
}
</style>
</head>

<body onclick="startAll()">

<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<div class="center">
    <div id="text"></div>
    <div id="heart">❤️</div>
</div>

<script>
let started = false;

function startAll() {
    if (started) return;
    started = true;
    document.getElementById("music").play().catch(() => {});
    startText();
}

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    setupDrops();
}

const phrase = "i love you bell";
const fontSize = 9;
let columns = 0;
let drops = [];

function setupDrops() {
    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) {
        drops.push(Math.random() * canvas.height);
    }
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff66cc";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        ctx.fillText(phrase, i * fontSize, drops[i]);

        drops[i] += 4; // a little slower

        if (drops[i] > canvas.height + 50) {
            drops[i] = -Math.random() * 300;
        }
    }
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
setInterval(draw, 30);

// CENTER TEXT
const steps = [
    "3",
    "2",
    "1",
    "I'm",
    "sorry",
    "bell",
    "please forgive me",
    "it was my fault 💔"
];

let stepIndex = 0;
const textDiv = document.getElementById("text");
const heart = document.getElementById("heart");

function startText() {
    showStep();
    const interval = setInterval(showStep, 2000);

    function showStep() {
        textDiv.style.opacity = 0;

        setTimeout(() => {
            textDiv.innerHTML = steps[stepIndex];
            textDiv.style.opacity = 1;
            stepIndex++;

            if (stepIndex >= steps.length) {
                heart.style.opacity = 1;
                clearInterval(interval);
            }
        }, 500);
    }
}
</script>

</body>
</html>
